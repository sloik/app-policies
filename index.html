<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>App Policies</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f8f5ef;
      --fg: #1d1a16;
      --muted: #6d655c;
      --link: #8a6418;
      --card: #fffaf0;
      --border: #d8cdbc;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #151412;
        --fg: #f4efe5;
        --muted: #bdb4a7;
        --link: #e0b85a;
        --card: #201e1a;
        --border: #3a352d;
      }
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.55;
      background: var(--bg);
      color: var(--fg);
    }

    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 56px 20px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 2rem;
      line-height: 1.15;
    }

    p {
      color: var(--muted);
    }

    ul {
      padding-left: 1.2rem;
    }

    a {
      color: var(--link);
      font-weight: 600;
    }

    .card {
      margin-top: 28px;
      padding: 20px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <main>
    <h1>App Policies</h1>
    <p>Public legal and privacy pages for apps by Łukasz Stocki.</p>

    <section class="card" aria-labelledby="privacy">
      <h2 id="privacy">Privacy Policies</h2>
      <ul>
        <li><a href="fartownik/privacy.html">Fartownik Privacy Policy</a></li>
      </ul>
    </section>

    <section class="card" aria-labelledby="support">
      <h2 id="support">Support Pages</h2>
      <ul>
        <li><a href="fartownik/support.html">Fartownik Support</a></li>
      </ul>
    </section>
  </main>
</body>
</html>
